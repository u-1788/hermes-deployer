<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes Agent 一键部署</title>
  <style>
    :root {
      --bg-deep: #060e1e; --bg-mid: #0a2a5e;
      --bg-card: rgba(10,42,94,0.45);
      --gold: #ffd54f; --gold-dim: rgba(255,213,79,0.12);
      --white: #fff; --muted: rgba(255,255,255,0.55);
      --radius: 16px; --radius-sm: 10px;
      --font: "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
      --transition: 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:var(--font);background:var(--bg-deep);color:var(--white);-webkit-font-smoothing:antialiased}
    
    /* Hero */
    .hero{
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;text-align:center;
      padding:40px 20px;position:relative;overflow:hidden;
      background:linear-gradient(135deg,#0a2a5e 0%,#060e1e 50%,#0a1a3e 100%);
    }
    #particle-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
    .hero-content{position:relative;z-index:2;max-width:800px}
    .kicker{font-size:14px;color:var(--gold);letter-spacing:6px;margin-bottom:20px}
    .hero h1{
      font-size:46px;font-weight:800;
      background:linear-gradient(135deg,#fff 0%,var(--gold) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;margin-bottom:16px;line-height:1.3;
    }
    .hero .sub{font-size:18px;color:var(--muted);margin-bottom:12px;letter-spacing:2px}
    .hero .tagline{
      display:inline-block;padding:8px 24px;border-radius:30px;
      background:var(--gold-dim);border:1px solid rgba(255,213,79,0.2);
      font-size:13px;color:var(--gold);margin-bottom:24px;
    }
    .hero-line{width:100px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 24px}
    .hero-desc{font-size:15px;color:var(--muted);line-height:1.8;margin-bottom:30px;max-width:560px;margin:0 auto 30px}
    .cta-btn{
      display:inline-flex;align-items:center;gap:8px;
      padding:14px 36px;border-radius:30px;
      background:var(--gold);color:var(--bg-deep);
      font-size:16px;font-weight:700;text-decoration:none;border:none;cursor:pointer;
      box-shadow:0 4px 20px rgba(255,213,79,0.3);transition:var(--transition);
    }
    .cta-btn:hover{transform:translateY(-2px)}
    .scroll-hint{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:2;color:var(--muted);font-size:13px;animation:bounce 2s infinite}
    @keyframes bounce{0%,100%{transform:translateX(-50%)translateY(0)}50%{transform:translateX(-50%)translateY(8px)}}

    /* Section */
    section{padding:64px 20px;max-width:1000px;margin:0 auto}
    .sec-title{text-align:center;margin-bottom:36px}
    .sec-title h2{font-size:28px;font-weight:700;margin-bottom:8px}
    .sec-title p{font-size:14px;color:var(--muted)}
    .gold-line{width:50px;height:3px;background:var(--gold);margin:14px auto 0;border-radius:2px}

    /* Grid - 10 items as real links */
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .card{
      display:block;
      background:var(--bg-card);backdrop-filter:blur(8px);
      border:1px solid rgba(255,213,79,0.06);
      border-radius:var(--radius);padding:22px 20px;
      transition:var(--transition);position:relative;overflow:hidden;
      cursor:pointer;text-decoration:none;color:inherit;
    }
    .card::before{
      content:'';position:absolute;top:0;left:0;width:4px;height:100%;
      background:var(--gold);opacity:0;transition:var(--transition);
    }
    .card:hover::before{opacity:1}
    .card:hover{transform:translateY(-3px);border-color:rgba(255,213,79,0.2)}
    .card-num{
      display:inline-flex;align-items:center;justify-content:center;
      width:34px;height:34px;border-radius:50%;
      background:var(--gold-dim);color:var(--gold);font-size:13px;font-weight:800;margin-bottom:10px;
    }
    .card h3{font-size:17px;font-weight:700;margin-bottom:6px;color:var(--white)}
    .card .icon{font-size:20px;margin-right:6px}
    .card .sub-label{font-size:13px;color:var(--gold);margin-bottom:6px;font-weight:500}
    .card p{font-size:13px;color:var(--muted);line-height:1.6}
    .card .action-hint{
      display:inline-block;margin-top:10px;
      font-size:11px;color:var(--gold);font-weight:600;
    }

    /* Footer */
    .footer-wrap{
      background:linear-gradient(180deg,transparent,rgba(10,42,94,0.15));
      padding:40px 20px;text-align:center;
      border-top:1px solid rgba(255,213,79,0.06);
    }
    .footer-wrap p{font-size:13px;color:var(--muted);line-height:1.8}
    .footer-wrap .brand{color:var(--gold);font-weight:600}

    @media(max-width:768px){
      .hero h1{font-size:30px}
      .grid{grid-template-columns:1fr}
      section{padding:40px 16px}
    }
  </style>
</head>
<body>

<header class="hero">
  <canvas id="particle-canvas"></canvas>
  <div class="hero-content">
    <div class="kicker">✦ Hermes Agent · 一键部署</div>
    <h1>装上 Hermes Agent 之后<br>必做10件事</h1>
    <p class="sub">点一下 · 跳转到智能体 · 自主学完配好</p>
    <div class="tagline">👆 不懂代码 · 没时间研究 · 照样用上AI数字员工</div>
    <div class="hero-line"></div>
    <p class="hero-desc">
      10项核心配置，点击即跳转学习。<br>
      让智能体自己去看、去学、去完成。
    </p>
    <a href="#list" class="cta-btn">📋 查看10件事</a>
  </div>
  <div class="scroll-hint">↓ 向下滚动</div>
</header>

<section id="list">
  <div class="sec-title">
    <h2>一键部署清单</h2>
    <p>点击任意项目 · 跳转到智能体自主学习</p>
    <div class="gold-line"></div>
  </div>
  <div class="grid" id="cardGrid"></div>
</section>

<div class="footer-wrap">
  <p>
    🤖 Hermes Agent 一键部署 · <span class="brand">文山州互联网协会</span> · 滇边AI · 心学智造<br>
    「从投资物到投资人，先修心再学器」<br>
    <span style="font-size:11px;">© 2026 文山州互联网协会 · All rights reserved.</span>
  </p>
</div>

<!-- Particle -->
<script>
(function(){
  const c=document.getElementById('particle-canvas'),ctx=c.getContext('2d');
  let p=[],a;
  function r(){c.width=window.innerWidth;c.height=window.innerHeight}
  class P{
    constructor(){this.reset()}
    reset(){this.x=Math.random()*c.width;this.y=Math.random()*c.height;this.s=Math.random()*2+0.5;this.sx=(Math.random()-0.5)*0.6;this.sy=(Math.random()-0.5)*0.6;this.o=Math.random()*0.5+0.1}
    update(){this.x+=this.sx;this.y+=this.sy;if(this.x<0||this.x>c.width)this.sx*=-1;if(this.y<0||this.y>c.height)this.sy*=-1}
    draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.s,0,Math.PI*2);ctx.fillStyle=`rgba(255,213,79,${this.o})`;ctx.fill()}
  }
  function init(){r();p=Array.from({length:80},()=>new P())}
  function animate(){
    ctx.clearRect(0,0,c.width,c.height);
    p.forEach(v=>{v.update();v.draw()});
    for(let i=0;i<p.length;i++)for(let j=i+1;j<p.length;j++){const dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<120){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle=`rgba(255,213,79,${0.08*(1-d/120)})`;ctx.lineWidth=0.5;ctx.stroke()}}
    a=requestAnimationFrame(animate)
  }
  window.addEventListener('resize',r);init();animate()
})();
</script>

<script>
const items = [
  {n:'01',icon:'🧭',title:'联网自主操作',sub:'AI自己看网页、填表格、做文档',desc:'像真人一样操作电脑，自动联网学习配置。'},
  {n:'02',icon:'🎭',title:'定义AI分身',sub:'从10+种性格中挑选',desc:'选一个性格，AI就有了自己的行为方式。'},
  {n:'03',icon:'⚖️',title:'分清任务大小',sub:'大模型做主，小模型跑腿',desc:'贵的干复杂活，便宜的干重复活，成本省大半。'},
  {n:'04',icon:'🧠',title:'自主记忆系统',sub:'AI自动记住历史对话',desc:'聊过什么AI自己记住，不用你重复说。'},
  {n:'05',icon:'🌐',title:'联网搜索升级',sub:'不让AI闭卷考试',desc:'给AI装上实时搜索，查资料一步到位。'},
  {n:'06',icon:'📜',title:'审计自动化',sub:'每步操作都有记录',desc:'AI干了什么全部自动留存，随时可查。'},
  {n:'07',icon:'🛡️',title:'Docker安全箱',sub:'危险命令自动拦截',desc:'在沙箱里干活，危险操作自动被拦住。'},
  {n:'08',icon:'👥',title:'三人决策团队',sub:'产品+工程+用户三方辩论',desc:'三个AI角色辩论，给你最优解。'},
  {n:'09',icon:'🔒',title:'三层备份策略',sub:'数据永不丢失',desc:'本地+云端+版本控制，三重保险。'},
  {n:'10',icon:'🌱',title:'技能自动进化',sub:'越用越强，越积越值钱',desc:'完成任务自动变成技能，越用越聪明。'},
];

const grid = document.getElementById('cardGrid');
items.forEach((item, idx) => {
  const card = document.createElement('a');
  card.className = 'card';
  // 用 小优 的指令作为跳转目标 —— 让智能体去学习
  card.href = `#learn-${item.n}`;
  card.innerHTML = `
    <div class="card-num">${item.n}</div>
    <h3><span class="icon">${item.icon}</span> ${item.title}</h3>
    <p class="sub-label">${item.sub}</p>
    <p>${item.desc}</p>
    <span class="action-hint">🤖 让智能体去学 →</span>
  `;
  card.addEventListener('click', (e) => {
    e.preventDefault();
    // 跳转：打开智能体学习指令
    const cmd = encodeURIComponent(`请帮我完成 Hermes Agent 配置第${item.n}项：「${item.title}」- ${item.sub}。自主学习并完成配置。`);
    // 这里放一个跳转地址，指向智能体的学习入口
    // 对于 Hermes Agent 用户，可以是一个本地链接
    // 对于其他平台，可以是一个指令页面
    const agentUrl = `https://u-1788.github.io/hermes-deployer/learn.html?task=${item.n}&title=${encodeURIComponent(item.title)}&cmd=${cmd}`;
    window.location.href = agentUrl;
  });
  grid.appendChild(card);
});
</script>
</body>
</html>
